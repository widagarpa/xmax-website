<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 116 40" width="116" height="40">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbb96a"/>
      <stop offset="50%" stop-color="#c8a04e"/>
      <stop offset="100%" stop-color="#9a7a2e"/>
    </linearGradient>
  </defs>
  <!-- X: 1/3 proporción, centrada verticalmente -->
  <text x="0" y="20" dominant-baseline="central" font-family="'Clash Display','Inter',system-ui,sans-serif" font-weight="700" font-size="10" fill="url(#goldGrad)">X</text>
  <!-- ( paréntesis izq: más grande que MAX -->
  <text x="10" y="20" dominant-baseline="central" font-family="'Clash Display','Inter',system-ui,sans-serif" font-weight="700" font-size="34" fill="url(#goldGrad)">(</text>
  <!-- MAX: centrado vertical, dentro de paréntesis -->
  <text x="25" y="20" dominant-baseline="central" font-family="'Clash Display','Inter',system-ui,sans-serif" font-weight="700" font-size="28" letter-spacing="1" fill="url(#goldGrad)">MAX</text>
  <!-- ) paréntesis der -->
  <text x="97" y="20" dominant-baseline="central" font-family="'Clash Display','Inter',system-ui,sans-serif" font-weight="700" font-size="34" fill="url(#goldGrad)">)</text>
</svg>
