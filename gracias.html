        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {

            flex-direction: column;

            color: var(--black);
        }

        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }

        /* ========== NAV ========== */
        .nav {

            top: 0;

            align-items: center;
            justify-content: space-between;

        .thank-you-inner {

        }

        /* Checkmark icon */
        .checkmark-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent-glow);
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .checkmark-circle svg {
            width: 48px;
            height: 48px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .checkmark-path {
            stroke-dasharray: 40;
            stroke-dashoffset: 40;
            animation: drawCheck 0.4s 0.4s ease forwards;
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        .thank-you h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            animation: fadeUp 0.5s 0.3s ease both;
        }

        .thank-you p {
            font-size: 1.1rem;
            color: var(--gray-400);
            margin-bottom: 2.5rem;
            line-height: 1.7;
            animation: fadeUp 0.5s 0.45s ease both;
        }

        @keyframes fadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: fadeUp 0.5s 0.6s ease both;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 14px 32px;
            background: var(--gradient-accent);
            color: var(--black);
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(200, 160, 78, 0.3);
        }

        .link-whatsapp {

            gap: 0.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--accent);
            transition: opacity 0.2s;
        }

        .link-whatsapp:hover {

        }

        .link-whatsapp svg {
            width: 18px;
            height: 18px;
            fill: var(--accent);
        }

        /* Countdown */
        .countdown {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--gray-500);
            animation: fadeUp 0.5s 0.75s ease both;
        }

        .countdown span {
            font-weight: 600;
            color: var(--accent);
        }

        /* ========== FOOTER ========== */

            border-top: 1px solid rgba(255,255,255,0.06);
            background: var(--black);

        .footer-social {
